<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The VA From Isoko</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="profile-collage" aria-label="Portfolio Introduction">
    <div class="grid">
        <!-- Brand Block: PA Logo + Golden Line -->
        <div class="card card--brand">
            <img src="paicon.png" alt="PA Monogram Logo" loading="eager">
            <!-- Note: If the golden line is IN the image, remove the span below. 
                 If it's CSS decoration, keep it. Based on your description, 
                 assuming the image contains both PA and line, so we center it. -->
        </div>

        <!-- Suit: Corporate authority shot -->
        <div class="card card--suit">
            <img src="suit.png" alt="Professional in business suit" loading="lazy">
        </div>

        <!-- Black/White: Full frame artistic shot -->
        <div class="card card--bw">
            <img src="blackwhite.png" alt="Black and white portrait" loading="lazy">
        </div>

        <!-- Jacket: Casual professional -->
        <div class="card card--jacket">
            <img src="jacket.png" alt="Professional in jacket" loading="lazy">
        </div>
    </div>

    <!-- Center Floating: The Hero Shot -->
    <a href="#about" class="center-card" aria-label="Learn more about The VA From Isoko">
        <img src="lounge.png" alt="Relaxed professional portrait" loading="eager">
    </a>

    <p class="website">THE VA FROM ISOKO</p>
</section>

<section class="intro" id="about">
    <h1>The VA From Isoko</h1>
    <p>Digital Builder • Systems Thinker • Social Media Strategist</p>
    <a href="about.html" class="cta">Enter Site</a>
</section>

</body>
</html>
